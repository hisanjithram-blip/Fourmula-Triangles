<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagorean Theorem Formula Triangle</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }

        .container {
            text-align: center;
        }

        /* SVG Layout and Styles */
        svg {
            width: 300px;
            height: 260px;
        }

        .section {
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .section:hover {
            opacity: 0.8;
        }

        /* Triangle Outline and Dividers */
        .border {
            fill: none;
            stroke: #000;
            stroke-width: 3;
        }

        .divider {
            stroke: #000;
            stroke-width: 2;
        }

        /* Text Elements */
        text {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Fira Code', monospace;
            text-anchor: middle;
            dominant-baseline: middle;
            user-select: none;
        }

        /* Hidden state for covered section */
        .covered {
            fill: #e65100 !important; /* Orange cover color */
        }
        
        .covered-text {
            visibility: hidden;
        }

        /* Formula Display Box */
        #formula-display {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            min-height: 35px;
            color: #333;
        }
        
        .instructions {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .back-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .back-button:hover {
            background: white;
            color: #667eea;
            border-color: #667eea;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-button">← Back to Homepage</a>
    <div class="instructions">Click a section of the triangle to reveal its formula</div>
    
    <svg viewBox="0 0 300 260">
        <!-- Definition of shapes used for clickable background areas -->
        <!-- Distance (Top Triangle) -->
        <polygon id="bg-A²" class="section" points="150,20 75,140 225,140" fill="#fff" onclick="reveal('A²')"/>
        
        <!-- Speed (Bottom Left Quad) -->
        <polygon id="bg-B²" class="section" points="75,140 150,140 150,240 20,240" fill="#fff" onclick="reveal('B²')"/>
        
        <!-- Time (Bottom Right Quad) -->
        <polygon id="bg-C²" class="section" points="150,140 225,140 280,240 150,240" fill="#fff" onclick="reveal('C²')"/>

        <!-- Visual Grid Lines (Drawn over backgrounds) -->
        <polygon class="border" points="150,20 20,240 280,240" />
        <line class="divider" x1="75" y1="140" x2="225" y2="140" />
        <line class="divider" x1="150" y1="140" x2="150" y2="240" />

        <!-- Text Labels (Pointer-events none so clicks pass through to shapes) -->
        <text id="text-A²" x="150" y="95" pointer-events="none">A²</text>
        <text id="text-B²" x="95" y="195" pointer-events="none">B²</text>
        <text id="text-C²" x="205" y="195" pointer-events="none">C²</text>
    </svg>

    <div id="formula-display">Select a variable</div>
</div>

<script>
    function reveal(variable) {
        // Reset all sections to default state
        document.getElementById('bg-A²').classList.remove('covered');
        document.getElementById('bg-B²').classList.remove('covered');
        document.getElementById('bg-C²').classList.remove('covered');

        const display = document.getElementById('formula-display');

        // Apply visual updates and update formula text based on selection
        if (variable === 'A²') {
            document.getElementById('bg-A²').classList.add('covered');
            document.getElementById('text-A²').classList.add('covered-text');
            display.innerHTML = "A² = B² + C²";
        } else if (variable === 'B²') {
            document.getElementById('bg-B²').classList.add('covered');
            document.getElementById('text-B²').classList.add('covered-text');
            display.innerHTML = "B² = A² - C²";
        } else if (variable === 'C²') {
            document.getElementById('bg-C²').classList.add('covered');
            document.getElementById('text-C²').classList.add('covered-text');
            display.innerHTML = "C² = A² - B²";
        }
    }
</script>

</body>
</html>
